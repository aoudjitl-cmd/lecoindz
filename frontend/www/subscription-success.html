<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeCoinDZ — Abonnement activé</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
    .container { max-width: 480px; margin: 5rem auto; padding: 0 1rem; text-align: center; }
    .card { background: white; border-radius: 12px; padding: 3rem 2rem; border: 1px solid #e0e0e0; }
    .icon { font-size: 5rem; margin-bottom: 1.5rem; }
    .btn { padding: 12px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.95rem; font-weight: 600; text-decoration: none; display: block; margin-bottom: 0.75rem; }
    .btn-primary { background: #e63946; color: white; }
    .btn-outline { background: white; border: 1.5px solid #e0e0e0; color: #444; }
  </style>
</head>
<body>
  <div class="container">
    <div id="loading" style="color:#888;">Activation en cours...</div>
    <div id="success" style="display:none;" class="card">
      <div class="icon">🎉</div>
      <h1 style="font-size:1.6rem; font-weight:800; margin-bottom:1rem;">Bienvenue sur LeCoinDZ Premium !</h1>
      <p style="color:#666; margin-bottom:2rem;">Votre mois d'essai gratuit est activé.</p>
      <a href="products.html" class="btn btn-primary">📦 Voir les annonces</a>
      <a href="dashboard.html" class="btn btn-outline">📋 Mon tableau de bord</a>
    </div>
    <div id="error" style="display:none;" class="card">
      <div class="icon">❌</div>
      <h2>Une erreur est survenue</h2>
      <a href="subscription.html" class="btn btn-primary" style="margin-top:1rem;">Réessayer</a>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script>
    (async () => {
      const sessionId = new URLSearchParams(window.location.search).get("session_id");
      if (!sessionId) { window.location.href = "subscription.html"; return; }
      try {
        await SubscriptionsAPI.verify(sessionId);
        document.getElementById("loading").style.display = "none";
        document.getElementById("success").style.display = "block";
      } catch(e) {
        document.getElementById("loading").style.display = "none";
        document.getElementById("error").style.display = "block";
      }
    })();
  </script>
</body>
</html>

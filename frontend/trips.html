<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RayahDZ - Trajets disponibles</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="navbar-brand">📦 RayahDZ</a>
    <div class="navbar-nav">
      <a href="dashboard.html" class="nav-link">📋 <span>Dashboard</span></a>
      <a href="trips.html" class="nav-link">✈️ <span>Trajets</span></a>
      <a href="parcels.html" class="nav-link active">📦 <span>Colis</span></a>
      <a href="conversations.html" class="nav-link" id="nav-messages">💬 Messages</a>
      <a href="subscription.html" class="nav-link">⭐ <span>Premium</span></a>
      <div id="nav-auth"></div>
    </div>
  </nav>

  <div class="container section">

    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem; flex-wrap:wrap; gap:1rem;">
      <h1 class="section-title" style="margin:0;">Trajets disponibles</h1>
      <button class="btn btn-primary" id="btn-publier">+ Publier mon trajet</button>
    </div>

    <div class="search-bar" style="margin-bottom:2rem;">
      <div class="form-group" style="flex:1; margin:0;">
        <label class="form-label">Ville de départ</label>
        <input type="text" id="filter-origin-city" class="form-input" placeholder="Ex: Paris">
      </div>
      <div class="form-group" style="flex:1; margin:0;">
        <label class="form-label">Ville d'arrivée</label>
        <input type="text" id="filter-dest-city" class="form-input" placeholder="Ex: Alger">
      </div>
      <div class="form-group" style="margin:0;">
        <label class="form-label">Poids min (kg)</label>
        <input type="number" id="filter-weight" class="form-input" placeholder="Ex: 5" style="width:120px;">
      </div>
      <button class="btn btn-primary" id="btn-filtrer">Filtrer</button>
      <button class="btn btn-outline" id="btn-reset">Réinitialiser</button>
    </div>

    <div id="alert-container"></div>

    <div id="trips-container" class="card-grid">
      <p style="color:var(--gray-400);">Chargement...</p>
    </div>

  </div>

  <!-- FORMULAIRE PUBLIER UN TRAJET -->
  <div id="form-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200; align-items:center; justify-content:center;">
    <div class="card" style="width:100%; max-width:560px; max-height:90vh; overflow-y:auto; margin:1rem;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
        <h2 style="font-size:1.2rem;">Publier un trajet</h2>
        <button id="btn-fermer-form" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">&#x2715;</button>
      </div>
      <div id="alert-form"></div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Ville de depart</label>
          <input type="text" id="t-origin-city" class="form-input" placeholder="Paris">
        </div>
        <div class="form-group">
          <label class="form-label">Pays de depart</label>
          <input type="text" id="t-origin-country" class="form-input" placeholder="France">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Ville d'arrivee</label>
          <input type="text" id="t-dest-city" class="form-input" placeholder="Alger">
        </div>
        <div class="form-group">
          <label class="form-label">Pays d'arrivee</label>
          <input type="text" id="t-dest-country" class="form-input" placeholder="Algerie">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Date de depart</label>
          <input type="date" id="t-departure" class="form-input">
        </div>
        <div class="form-group">
          <label class="form-label">Date d'arrivee</label>
          <input type="date" id="t-arrival" class="form-input">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Poids disponible (kg)</label>
          <input type="number" id="t-weight" class="form-input" placeholder="10">
        </div>
        <div class="form-group">
          <label class="form-label">Taille max</label>
          <select id="t-size" class="form-input">
            <option value="SMALL">Small (cabine)</option>
            <option value="MEDIUM" selected>Medium (valise)</option>
            <option value="LARGE">Large (grande valise)</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Prix par kg (€)</label>
        <input type="number" id="t-price" class="form-input" placeholder="5.00" step="0.5">
      </div>
      <div class="form-group">
        <label class="form-label">Description (optionnel)</label>
        <textarea id="t-description" class="form-input" rows="3" placeholder="Informations supplementaires..."></textarea>
      </div>
      <button class="btn btn-primary btn-full" id="btn-publier-trajet">Publier le trajet</button>
    </div>
  </div>

  <!-- MODAL AVIS UTILISATEUR -->
  <div id="avis-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:300; align-items:center; justify-content:center;">
    <div class="card" style="width:100%; max-width:480px; max-height:80vh; overflow-y:auto; margin:1rem;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.25rem;">
        <h2 id="avis-titre" style="font-size:1.1rem;">Avis</h2>
        <button onclick="fermerAvis()" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">✕</button>
      </div>
      <div id="avis-moyenne" style="text-align:center; margin-bottom:1.25rem;"></div>
      <div id="avis-liste"></div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    let currentUser = null;

    // ===== MODAL AVIS =====
    async function voirAvis(userId, userName) {
      document.getElementById("avis-titre").textContent = "Avis sur " + userName;
      document.getElementById("avis-moyenne").innerHTML = "<p style='color:var(--gray-400);'>Chargement...</p>";
      document.getElementById("avis-liste").innerHTML = "";
      document.getElementById("avis-overlay").style.display = "flex";

      try {
        const data = await apiCall("/reviews/user/" + userId);

        if (data.total === 0) {
          document.getElementById("avis-moyenne").innerHTML = `
            <p style="color:var(--gray-400); font-size:0.9rem;">Aucun avis pour le moment.</p>`;
          return;
        }

        // Moyenne
        const etoiles = "★".repeat(Math.round(data.average)) + "☆".repeat(5 - Math.round(data.average));
        document.getElementById("avis-moyenne").innerHTML = `
          <div style="font-size:1.8rem; color:#f59e0b;">${etoiles}</div>
          <div style="font-weight:700; font-size:1.1rem; margin-top:4px;">${data.average} / 5</div>
          <div style="font-size:0.85rem; color:var(--gray-400);">${data.total} avis</div>`;

        // Liste des avis
        document.getElementById("avis-liste").innerHTML = data.reviews.map(r => {
          const etoilesR = "★".repeat(r.rating) + "☆".repeat(5 - r.rating);
          const date = new Date(r.created_at).toLocaleDateString("fr-FR", {
            day: "numeric", month: "long", year: "numeric"
          });
          return `
            <div style="border-top:1px solid var(--gray-100); padding:1rem 0;">
              <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
                <div style="font-weight:600; font-size:0.9rem;">
                  ${r.reviewer.first_name} ${r.reviewer.last_name}
                </div>
                <div style="color:#f59e0b; font-size:0.95rem;">${etoilesR}</div>
              </div>
              ${r.comment ? `<p style="font-size:0.875rem; color:var(--gray-600); margin:0;">${r.comment}</p>` : ""}
              <div style="font-size:0.75rem; color:var(--gray-400); margin-top:4px;">${date}</div>
            </div>`;
        }).join("");

      } catch(e) {
        document.getElementById("avis-moyenne").innerHTML =
          "<p style='color:var(--danger);'>Impossible de charger les avis.</p>";
      }
    }

    function fermerAvis() {
      document.getElementById("avis-overlay").style.display = "none";
    }

    // ===== TRAJETS =====
    async function supprimerTrajet(tripId) {
      if (!confirm("Voulez-vous vraiment supprimer ce trajet ?")) return;
      try {
        await TripsAPI.delete(tripId);
        showAlert("Trajet supprime !", "success");
        await searchTrips();
      } catch (e) {
        showAlert(e.message);
      }
    }

    async function searchTrips() {
      const params = {};
      const destCity = document.getElementById("filter-dest-city").value;
      const originCity = document.getElementById("filter-origin-city").value;
      const minWeight = document.getElementById("filter-weight").value;
      if (destCity) params.dest_city = destCity;
      if (originCity) params.origin_city = originCity;
      if (minWeight) params.min_weight = minWeight;
      try {
        const data = await TripsAPI.search(params);
        renderTrips(data.trips);
      } catch (e) {
        showAlert(e.message);
      }
    }

    function resetFilters() {
      document.getElementById("filter-dest-city").value = "";
      document.getElementById("filter-origin-city").value = "";
      document.getElementById("filter-weight").value = "";
      searchTrips();
    }

    function renderTrips(trips) {
      const container = document.getElementById("trips-container");
      if (trips.length === 0) {
        container.innerHTML = "<p style='color:var(--gray-400); grid-column:1/-1;'>Aucun trajet trouve.</p>";
        return;
      }
      container.innerHTML = trips.map(trip => `
        <div class="card">
          <div style="display:flex; justify-content:space-between; align-items:start; margin-bottom:0.75rem;">
            <div>
              <div style="font-weight:700; font-size:1.05rem;">${trip.origin_city} → ${trip.dest_city}</div>
              <div style="color:var(--gray-400); font-size:0.82rem;">${trip.origin_country} → ${trip.dest_country}</div>
            </div>
            <span style="font-weight:800; color:var(--primary); font-size:1.15rem;">${trip.price_per_kg}€/kg</span>
          </div>
          <div style="font-size:0.875rem; color:var(--gray-600); margin-bottom:1rem; display:flex; flex-direction:column; gap:4px;">
            <span>Depart : <strong>${formatDate(trip.departure_date)}</strong></span>
            <span>Arrivee : <strong>${formatDate(trip.arrival_date)}</strong></span>
            <span>Capacite : <strong>${trip.max_weight} kg</strong> · ${trip.max_size}</span>
          </div>
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <div style="font-size:0.85rem; color:var(--gray-600);">
              <span onclick="voirAvis(${trip.user_id}, '${trip.carrier.first_name} ${trip.carrier.last_name}')"
                style="cursor:pointer; text-decoration:underline; text-underline-offset:3px;">
                ${trip.carrier.first_name} ${trip.carrier.last_name}
              </span>
              <span style="color:#f59e0b;">★</span> ${trip.carrier.rating || "Nouveau"}
            </div>
            ${getStatusBadge(trip.status)}
          </div>
          ${trip.user_id !== currentUser?.id ? `
            <div style="margin-top:1rem;">
              <a href="direct-chat.html?user_id=${trip.user_id}&name=${encodeURIComponent(trip.carrier.first_name + ' ' + trip.carrier.last_name)}"
                class="btn btn-outline btn-full btn-sm">
                Contacter le voyageur
              </a>
            </div>` : `
            <div style="margin-top:1rem; display:flex; justify-content:space-between; align-items:center;">
              <span style="font-size:0.8rem; color:var(--gray-400);">Votre trajet</span>
              <button class="btn btn-danger btn-sm" onclick="supprimerTrajet(${trip.id})">
                Supprimer
              </button>
            </div>`}
        </div>
      `).join("");
    }

    function ouvrirFormulaire() {
      document.getElementById("form-overlay").style.display = "flex";
    }

    function fermerFormulaire() {
      document.getElementById("form-overlay").style.display = "none";
    }

    async function publierTrajet() {
      try {
        await TripsAPI.create({
          origin_city: document.getElementById("t-origin-city").value,
          origin_country: document.getElementById("t-origin-country").value,
          dest_city: document.getElementById("t-dest-city").value,
          dest_country: document.getElementById("t-dest-country").value,
          departure_date: document.getElementById("t-departure").value,
          arrival_date: document.getElementById("t-arrival").value,
          max_weight: parseFloat(document.getElementById("t-weight").value),
          max_size: document.getElementById("t-size").value,
          price_per_kg: parseFloat(document.getElementById("t-price").value),
          description: document.getElementById("t-description").value,
        });
        fermerFormulaire();
        showAlert("Trajet publie avec succes !", "success");
        searchTrips();
      } catch (e) {
        showAlert(e.message, "error", "alert-form");
      }
    }

    (async () => {
      await requireSubscription();
      updateNavbar();
      currentUser = Auth.getUser();

      document.getElementById("btn-publier").addEventListener("click", ouvrirFormulaire);
      document.getElementById("btn-filtrer").addEventListener("click", searchTrips);
      document.getElementById("btn-reset").addEventListener("click", resetFilters);
      document.getElementById("btn-fermer-form").addEventListener("click", fermerFormulaire);
      document.getElementById("btn-publier-trajet").addEventListener("click", publierTrajet);

      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get("dest_city")) {
        document.getElementById("filter-dest-city").value = urlParams.get("dest_city");
        document.getElementById("filter-origin-city").value = urlParams.get("origin_city") || "";
      }
      searchTrips();
    })();
  </script>
  <script src="js/hamburger.js"></script>
</body>
</html>

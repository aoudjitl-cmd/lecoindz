<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeCoinDZ — Vérification email</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
    .container { max-width: 460px; margin: 5rem auto; padding: 0 1rem; text-align: center; }
    .card { background: white; border-radius: 12px; padding: 3rem 2rem; border: 1px solid #e0e0e0; }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    .btn { padding: 12px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.95rem; font-weight: 600; text-decoration: none; display: block; background: #e63946; color: white; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <div class="container">
    <div id="loading" style="color:#888; padding:2rem;">Vérification en cours...</div>
    <div id="success" style="display:none;" class="card">
      <div class="icon">?</div>
      <h1 style="font-size:1.5rem; font-weight:700; margin-bottom:1rem;">Email vérifié !</h1>
      <p style="color:#666; margin-bottom:1.5rem;">Votre compte est activé. Vous ętes connecté automatiquement.</p>
      <a href="index.html" class="btn">Aller sur LeCoinDZ</a>
    </div>
    <div id="error" style="display:none;" class="card">
      <div class="icon">?</div>
      <h2 style="margin-bottom:1rem;">Lien invalide</h2>
      <p style="color:#666;">Ce lien a déjŕ été utilisé ou a expiré.</p>
      <a href="login.html" class="btn">Retour ŕ la connexion</a>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script>
    (async () => {
      const token = new URLSearchParams(window.location.search).get("token");
      if (!token) { window.location.href = "login.html"; return; }
      try {
        const data = await apiCall("/auth/verify-email?token=" + encodeURIComponent(token));
        Auth.setSession(data.token, data.user);
        document.getElementById("loading").style.display = "none";
        document.getElementById("success").style.display = "block";
      } catch(e) {
        document.getElementById("loading").style.display = "none";
        document.getElementById("error").style.display = "block";
      }
    })();
  </script>
</body>
</html>

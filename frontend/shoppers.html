<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeCoinDZ — Shoppers disponibles</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; }
    .navbar { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 0 1.5rem; display: flex; align-items: center; gap: 1rem; height: 56px; position: sticky; top: 0; z-index: 100; }
    .navbar-brand { font-size: 1.4rem; font-weight: 800; color: #e63946; text-decoration: none; }
    .navbar-brand span { color: #1a1a1a; }
    .navbar-nav { display: flex; align-items: center; gap: 0.75rem; margin-left: auto; }
    .nav-link { color: #444; text-decoration: none; font-size: 0.875rem; padding: 6px 10px; border-radius: 6px; }
    .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.875rem; font-weight: 600; text-decoration: none; display: inline-block; }
    .btn-primary { background: #e63946; color: white; }
    .btn-primary:hover { background: #c1121f; }
    .btn-outline { background: white; border: 1.5px solid #e0e0e0; color: #444; }
    .btn-outline:hover { border-color: #e63946; color: #e63946; }
    .btn-sm { padding: 6px 12px; font-size: 0.8rem; }
    .btn-full { width: 100%; }
    .container { max-width: 1000px; margin: 0 auto; padding: 1.5rem; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .page-header h1 { font-size: 1.3rem; font-weight: 700; }
    .search-bar { display: flex; gap: 0.75rem; background: white; border: 1px solid #e0e0e0; border-radius: 8px; padding: 1rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .search-bar input { flex: 1; min-width: 150px; padding: 8px 12px; border: 1px solid #e0e0e0; border-radius: 6px; font-size: 0.875rem; outline: none; }
    .search-bar input:focus { border-color: #e63946; }
    .shoppers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
    .shopper-card { background: white; border: 1px solid #e0e0e0; border-radius: 8px; padding: 1.25rem; }
    .shopper-card:hover { border-color: #e63946; }
    .shopper-avatar { width: 48px; height: 48px; border-radius: 50%; background: #e63946; color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.2rem; flex-shrink: 0; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; }
    .modal { background: white; border-radius: 12px; padding: 1.5rem; width: 100%; max-width: 480px; margin: 1rem; max-height: 90vh; overflow-y: auto; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.85rem; color: #444; margin-bottom: 4px; font-weight: 500; }
    .form-group input, .form-group textarea { width: 100%; padding: 10px 12px; border: 1.5px solid #e0e0e0; border-radius: 6px; font-size: 0.875rem; outline: none; font-family: inherit; }
    .form-group input:focus, .form-group textarea:focus { border-color: #e63946; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .alert { padding: 12px 16px; border-radius: 6px; margin-bottom: 1rem; font-size: 0.875rem; }
    .alert-error { background: #fff5f5; color: #c1121f; border: 1px solid #fca5a5; }
    .alert-success { background: #f0fdf4; color: #166534; border: 1px solid #86efac; }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="navbar-brand">LeCoin<span>DZ</span></a>
    <div class="navbar-nav">
      <a href="products.html" class="nav-link">📦 Annonces</a>
      <a href="shoppers.html" class="nav-link">🛍️ Shoppers</a>
      <a href="dashboard.html" class="nav-link">📋 Dashboard</a>
      <a href="conversations.html" class="nav-link" id="nav-messages">💬 Messages</a>
      <div id="nav-auth"></div>
    </div>
  </nav>

  <div class="container">

    <div id="alert-container"></div>

    <div class="page-header">
      <h1>🛍️ Shoppers disponibles</h1>
      <button class="btn btn-primary" id="btn-publier">+ Proposer mes services</button>
    </div>

    <div class="search-bar">
      <input type="text" id="filter-city" placeholder="🔍 Ville (ex: Paris, Lyon...)">
      <button class="btn btn-primary btn-sm" onclick="searchShoppers()">Filtrer</button>
      <button class="btn btn-outline btn-sm" onclick="resetFilters()">Réinitialiser</button>
    </div>

    <div id="shoppers-grid" class="shoppers-grid">
      <p style="color:#888;">Chargement...</p>
    </div>

  </div>

  <!-- MODAL PUBLIER -->
  <div class="modal-overlay" id="publish-overlay">
    <div class="modal">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.25rem;">
        <h2 style="font-size:1rem; font-weight:700;">🛍️ Proposer mes services</h2>
        <button onclick="fermerModal()" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">✕</button>
      </div>
      <div id="alert-modal"></div>
      <div class="form-group">
        <label>Ville où vous êtes *</label>
        <input type="text" id="s-city" placeholder="Ex: Paris">
      </div>
      <div class="form-group">
        <label>Pays</label>
        <input type="text" id="s-country" value="France">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Disponible à partir du</label>
          <input type="date" id="s-from">
        </div>
        <div class="form-group">
          <label>Jusqu'au</label>
          <input type="date" id="s-until">
        </div>
      </div>
      <div class="form-group">
        <label>Zones de livraison</label>
        <input type="text" id="s-zones" placeholder="Ex: Alger, Oran, Constantine">
      </div>
      <div class="form-group">
        <label>Description (optionnel)</label>
        <textarea id="s-description" rows="3" placeholder="Présentez vos services..."></textarea>
      </div>
      <button class="btn btn-primary btn-full" onclick="publierShopper()">Publier</button>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    (async () => {
      await requireSubscription();
      updateNavbar();

      document.getElementById("btn-publier").addEventListener("click", () => {
        document.getElementById("publish-overlay").style.display = "flex";
      });

      async function searchShoppers() {
        const params = {};
        const city = document.getElementById("filter-city").value;
        if (city) params.city = city;
        try {
          const data = await ShoppersAPI.search(params);
          renderShoppers(data.shoppers);
        } catch(e) { showAlert(e.message); }
      }

      window.searchShoppers = searchShoppers;
      window.resetFilters = () => {
        document.getElementById("filter-city").value = "";
        searchShoppers();
      };

      function renderShoppers(shoppers) {
        const grid = document.getElementById("shoppers-grid");
        if (shoppers.length === 0) {
          grid.innerHTML = `<p style="color:#888; grid-column:1/-1;">Aucun shopper disponible pour le moment.</p>`;
          return;
        }
        grid.innerHTML = shoppers.map(s => `
          <div class="shopper-card">
            <div style="display:flex; align-items:center; gap:0.75rem; margin-bottom:0.75rem;">
              <div class="shopper-avatar">${s.shopper.first_name[0].toUpperCase()}</div>
              <div>
                <div style="font-weight:600;">${s.shopper.first_name} ${s.shopper.last_name}</div>
                <div style="font-size:0.8rem; color:#e63946;">📍 ${s.city}, ${s.country}</div>
                ${s.shopper.rating ? `<div style="font-size:0.8rem; color:#888;">⭐ ${s.shopper.rating}</div>` : ''}
              </div>
            </div>
            ${s.description ? `<p style="font-size:0.85rem; color:#666; margin-bottom:0.75rem;">${s.description}</p>` : ''}
            ${s.delivery_zones ? `<div style="font-size:0.8rem; color:#444; margin-bottom:0.75rem;">📦 Livraison : ${s.delivery_zones}</div>` : ''}
            ${s.available_from ? `<div style="font-size:0.8rem; color:#888; margin-bottom:0.75rem;">📅 Disponible du ${formatDate(s.available_from)} au ${formatDate(s.available_until)}</div>` : ''}
            <a href="direct-chat.html?user_id=${s.user_id}&name=${encodeURIComponent(s.shopper.first_name + ' ' + s.shopper.last_name)}"
              class="btn btn-outline btn-sm btn-full">Contacter ce shopper</a>
          </div>
        `).join('');
      }

      window.fermerModal = () => { document.getElementById("publish-overlay").style.display = "none"; };

      window.publierShopper = async () => {
        try {
          await ShoppersAPI.create({
            city: document.getElementById("s-city").value,
            country: document.getElementById("s-country").value || "France",
            available_from: document.getElementById("s-from").value || null,
            available_until: document.getElementById("s-until").value || null,
            delivery_zones: document.getElementById("s-zones").value || null,
            description: document.getElementById("s-description").value || null,
          });
          fermerModal();
          showAlert("Vos services ont été publiés !", "success");
          searchShoppers();
        } catch(e) { showAlert(e.message, "error", "alert-modal"); }
      };

      searchShoppers();
    })();
  </script>
  <script src="js/hamburger.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RayahDZ - Connexion</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body style="background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%); min-height:100vh; display:flex; align-items:center; justify-content:center;">

  <div style="width:100%; max-width:420px; padding:1rem;">
    <div style="text-align:center; margin-bottom:2rem;">
      <a href="index.html" style="font-size:1.8rem; font-weight:800; color:white;">RayahDZ</a>
      <p style="color:rgba(255,255,255,0.8); margin-top:0.5rem; font-size:0.9rem;">
        Envoyez vos colis avec des voyageurs
      </p>
    </div>

    <div class="card">
      <!-- Onglets -->
      <div style="display:flex; border-bottom:1px solid var(--gray-200); margin-bottom:1.5rem;">
        <button id="tab-login" onclick="switchTab('login')"
          style="flex:1; padding:12px; border:none; background:none; font-weight:600; color:var(--primary); border-bottom:2px solid var(--primary); cursor:pointer;">
          Connexion
        </button>
        <button id="tab-register" onclick="switchTab('register')"
          style="flex:1; padding:12px; border:none; background:none; color:var(--gray-400); cursor:pointer;">
          Inscription
        </button>
      </div>

      <div id="alert-container"></div>

      <!-- FORMULAIRE CONNEXION -->
      <div id="form-login">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="login-email" class="form-input" placeholder="votre@email.com">
        </div>
        <div class="form-group">
          <label class="form-label">Mot de passe</label>
          <input type="password" id="login-password" class="form-input" placeholder="••••••••">
        </div>
        <button class="btn btn-primary btn-full" id="btn-login">Se connecter</button>
      </div>

      <!-- FORMULAIRE INSCRIPTION -->
      <div id="form-register" style="display:none;">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Prenom</label>
            <input type="text" id="reg-firstname" class="form-input" placeholder="Jean">
          </div>
          <div class="form-group">
            <label class="form-label">Nom</label>
            <input type="text" id="reg-lastname" class="form-input" placeholder="Dupont">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" id="reg-email" class="form-input" placeholder="votre@email.com">
        </div>
        <div class="form-group">
          <label class="form-label">Telephone</label>
          <input type="tel" id="reg-phone" class="form-input" placeholder="06 12 34 56 78">
        </div>
        <div class="form-group">
          <label class="form-label">Mot de passe</label>
          <input type="password" id="reg-password" class="form-input" placeholder="••••••••">
        </div>
        <button class="btn btn-primary btn-full" id="btn-register">Creer mon compte</button>
      </div>
    </div>

    <div style="text-align:center; margin-top:1rem;">
      <a href="index.html" style="color:rgba(255,255,255,0.7); font-size:0.85rem;">
        Retour a l'accueil
      </a>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    // Si deja connecte, rediriger vers index
    if (Auth.isLoggedIn()) window.location.href = "index.html";

    // Lire le parametre mode dans l'URL
    const params = new URLSearchParams(window.location.search);
    if (params.get("mode") === "register") switchTab("register");

    function switchTab(tab) {
      document.getElementById("form-login").style.display = tab === "login" ? "block" : "none";
      document.getElementById("form-register").style.display = tab === "register" ? "block" : "none";
      document.getElementById("tab-login").style.color = tab === "login" ? "var(--primary)" : "var(--gray-400)";
      document.getElementById("tab-login").style.borderBottom = tab === "login" ? "2px solid var(--primary)" : "none";
      document.getElementById("tab-login").style.fontWeight = tab === "login" ? "600" : "400";
      document.getElementById("tab-register").style.color = tab === "register" ? "var(--primary)" : "var(--gray-400)";
      document.getElementById("tab-register").style.borderBottom = tab === "register" ? "2px solid var(--primary)" : "none";
      document.getElementById("tab-register").style.fontWeight = tab === "register" ? "600" : "400";
    }

    async function handleLogin() {
      const btn = document.getElementById("btn-login");
      btn.disabled = true;
      btn.textContent = "Connexion...";
      try {
        const data = await AuthAPI.login({
          email: document.getElementById("login-email").value,
          password: document.getElementById("login-password").value,
        });
        Auth.setSession(data.token, data.user);
        window.location.href = "index.html";
      } catch (e) {
        showAlert(e.message);
        btn.disabled = false;
        btn.textContent = "Se connecter";
      }
    }

    async function handleRegister() {
      const btn = document.getElementById("btn-register");
      btn.disabled = true;
      btn.textContent = "Creation...";
      try {
        const data = await AuthAPI.register({
          email: document.getElementById("reg-email").value,
          password: document.getElementById("reg-password").value,
          first_name: document.getElementById("reg-firstname").value,
          last_name: document.getElementById("reg-lastname").value,
          phone: document.getElementById("reg-phone").value,
        });
        Auth.setSession(data.token, data.user);
        window.location.href = "index.html";
      } catch (e) {
        showAlert(e.message);
        btn.disabled = false;
        btn.textContent = "Creer mon compte";
      }
    }

    document.getElementById("btn-login").addEventListener("click", handleLogin);
    document.getElementById("btn-register").addEventListener("click", handleRegister);

    // Connexion avec la touche Entree
    document.getElementById("login-password").addEventListener("keydown", (e) => {
      if (e.key === "Enter") handleLogin();
    });
    document.getElementById("reg-password").addEventListener("keydown", (e) => {
      if (e.key === "Enter") handleRegister();
    });
  </script>
  <script src="js/hamburger.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeCoinDZ — Administration</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; }
    .navbar { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 0 1.5rem; display: flex; align-items: center; gap: 1rem; height: 56px; }
    .navbar-brand { font-size: 1.4rem; font-weight: 800; color: #e63946; text-decoration: none; }
    .navbar-brand span { color: #1a1a1a; }
    .navbar-nav { display: flex; align-items: center; gap: 0.75rem; margin-left: auto; }
    .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.875rem; font-weight: 600; text-decoration: none; display: inline-block; }
    .btn-primary { background: #e63946; color: white; }
    .btn-primary:hover { background: #c1121f; }
    .btn-outline { background: white; border: 1.5px solid #e0e0e0; color: #444; }
    .btn-danger { background: #dc2626; color: white; }
    .btn-warning { background: #f59e0b; color: white; border: none; }
    .btn-sm { padding: 6px 12px; font-size: 0.8rem; }
    .btn-full { width: 100%; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: white; border: 1px solid #e0e0e0; border-radius: 8px; padding: 1.25rem; text-align: center; }
    .stat-value { font-size: 2rem; font-weight: 800; color: #e63946; }
    .stat-label { font-size: 0.85rem; color: #888; margin-top: 4px; }
    .search-input { padding: 10px 14px; border: 1.5px solid #e0e0e0; border-radius: 6px; font-size: 0.9rem; width: 100%; max-width: 320px; outline: none; margin-bottom: 1rem; }
    .search-input:focus { border-color: #e63946; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; border: 1px solid #e0e0e0; }
    th { background: #f5f5f5; padding: 12px 16px; text-align: left; font-size: 0.8rem; color: #666; font-weight: 600; text-transform: uppercase; white-space: nowrap; }
    td { padding: 12px 16px; border-top: 1px solid #f0f0f0; font-size: 0.875rem; vertical-align: middle; }
    tr:hover td { background: #fafafa; }
    .actions { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .badge { padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
    .badge-success { background: #dcfce7; color: #166534; }
    .badge-warning { background: #fef3c7; color: #92400e; }
    .badge-danger { background: #fee2e2; color: #991b1b; }
    .badge-info { background: #dbeafe; color: #1e40af; }
    .alert { padding: 12px 16px; border-radius: 6px; margin-bottom: 1rem; font-size: 0.875rem; }
    .alert-error { background: #fff5f5; color: #c1121f; border: 1px solid #fca5a5; }
    .alert-success { background: #f0fdf4; color: #166534; border: 1px solid #86efac; }
    #login-overlay { position: fixed; inset: 0; background: linear-gradient(135deg, #e63946 0%, #c1121f 100%); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .login-card { background: white; border-radius: 12px; padding: 2rem; width: 100%; max-width: 380px; margin: 1rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.85rem; color: #444; margin-bottom: 4px; font-weight: 500; }
    .form-group input { width: 100%; padding: 10px 12px; border: 1.5px solid #e0e0e0; border-radius: 6px; font-size: 0.9rem; outline: none; }
    .form-group input:focus { border-color: #e63946; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; }
    .modal { background: white; border-radius: 12px; padding: 1.5rem; width: 100%; max-width: 400px; margin: 1rem; text-align: center; }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="login-overlay">
    <div class="login-card">
      <div style="text-align:center; margin-bottom:1.5rem;">
        <div style="font-size:2rem;">🔐</div>
        <h1 style="font-size:1.3rem; font-weight:700; margin-top:0.5rem;">Administration LeCoinDZ</h1>
      </div>
      <div id="alert-login"></div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="admin-email" placeholder="votre@email.com">
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="admin-password" placeholder="••••••••">
      </div>
      <button class="btn btn-primary btn-full" id="btn-admin-login">Se connecter</button>
    </div>
  </div>

  <!-- INTERFACE -->
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">LeCoin<span>DZ</span></a>
    <div class="navbar-nav">
      <span style="color:#666; font-size:0.9rem;">Administration</span>
      <button class="btn btn-outline btn-sm" onclick="Auth.logout()">Deconnexion</button>
    </div>
  </nav>

  <div class="container">
    <div id="alert-container"></div>
    <h1 style="font-size:1.4rem; font-weight:700; margin-bottom:1.5rem;">Gestion des utilisateurs</h1>

    <div class="stats-grid">
      <div class="stat-card"><div class="stat-value" id="stat-total">—</div><div class="stat-label">Utilisateurs</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-verified">—</div><div class="stat-label">Verifies</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-active">—</div><div class="stat-label">Abonnes actifs</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-trial">—</div><div class="stat-label">En essai</div></div>
    </div>

    <input type="text" class="search-input" id="search-users" placeholder="Rechercher par nom ou email...">

    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Nom</th>
            <th>Email</th>
            <th>Inscrit le</th>
            <th>Verifie</th>
            <th>Abonnement</th>
            <th>Fin essai</th>
            <th>Note</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="users-tbody">
          <tr><td colspan="9" style="text-align:center; color:#888; padding:2rem;">Chargement...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- MODAL SUPPRESSION -->
  <div class="modal-overlay" id="delete-overlay">
    <div class="modal">
      <div style="font-size:3rem; margin-bottom:1rem;">⚠️</div>
      <h2 style="margin-bottom:0.5rem;">Supprimer cet utilisateur ?</h2>
      <p id="delete-name" style="color:#666; margin-bottom:1rem;"></p>
      <p style="font-size:0.85rem; color:#dc2626; margin-bottom:1.5rem;">Toutes ses donnees seront supprimees.</p>
      <div style="display:flex; gap:1rem;">
        <button class="btn btn-outline btn-full" onclick="fermerDelete()">Annuler</button>
        <button class="btn btn-danger btn-full" id="btn-confirmer-delete">Supprimer</button>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    let tousLesUsers = [];
    let userToDelete = null;

    // LOGIN
    document.getElementById("btn-admin-login").addEventListener("click", async () => {
      const btn = document.getElementById("btn-admin-login");
      btn.disabled = true;
      btn.textContent = "Connexion...";
      try {
        const data = await AuthAPI.login({
          email: document.getElementById("admin-email").value,
          password: document.getElementById("admin-password").value,
        });
        Auth.setSession(data.token, data.user);
        try {
          await apiCall("/admin-api/users");
          document.getElementById("login-overlay").style.display = "none";
          loadUsers();
        } catch(e) {
          Auth.logout();
          showAlert("Acces refuse. Vous n'etes pas administrateur.", "error", "alert-login");
          btn.disabled = false;
          btn.textContent = "Se connecter";
        }
      } catch(e) {
        showAlert(e.message, "error", "alert-login");
        btn.disabled = false;
        btn.textContent = "Se connecter";
      }
    });

    document.getElementById("admin-password").addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("btn-admin-login").click();
    });

    async function loadUsers() {
      try {
        const data = await apiCall("/admin-api/users");
        tousLesUsers = data.users;
        updateStats(data.users);
        renderUsers(data.users);
      } catch(e) { showAlert(e.message); }
    }

    function updateStats(users) {
      document.getElementById("stat-total").textContent = users.length;
      document.getElementById("stat-verified").textContent = users.filter(u => u.is_verified).length;
      document.getElementById("stat-active").textContent = users.filter(u => u.subscription_status === "ACTIVE").length;
      document.getElementById("stat-trial").textContent = users.filter(u => u.subscription_status === "TRIAL").length;
    }

    function renderUsers(users) {
      const tbody = document.getElementById("users-tbody");
      if (users.length === 0) {
        tbody.innerHTML = `<tr><td colspan="9" style="text-align:center; color:#888; padding:2rem;">Aucun utilisateur.</td></tr>`;
        return;
      }
      tbody.innerHTML = users.map(u => {
        const subBadge = {
          "ACTIVE": `<span class="badge badge-success">Actif</span>`,
          "TRIAL": `<span class="badge badge-warning">Essai</span>`,
          "CANCELLED": `<span class="badge badge-danger">Annule</span>`,
        }[u.subscription_status] || `<span class="badge badge-info">${u.subscription_status || "—"}</span>`;

        const date = new Date(u.created_at).toLocaleDateString("fr-FR", { day: "numeric", month: "short", year: "numeric" });

        let trialEndCell = "—";
        if (u.trial_end) {
          const trialDate = new Date(u.trial_end);
          const daysLeft = Math.ceil((trialDate - new Date()) / 86400000);
          const formatted = trialDate.toLocaleDateString("fr-FR", { day: "numeric", month: "short" });
          trialEndCell = daysLeft < 0
            ? `<span style="color:#dc2626;">${formatted} (expire)</span>`
            : daysLeft <= 5
            ? `<span style="color:#f59e0b;">${formatted} (${daysLeft}j)</span>`
            : `<span style="color:#666;">${formatted}</span>`;
        }

        return `
          <tr>
            <td style="color:#888;">#${u.id}</td>
            <td style="font-weight:600;">${u.first_name} ${u.last_name}${u.is_admin ? ' <span style="font-size:0.7rem; background:#e63946; color:white; padding:2px 6px; border-radius:4px;">ADMIN</span>' : ''}</td>
            <td>${u.email}</td>
            <td style="color:#888; white-space:nowrap;">${date}</td>
            <td>${u.is_verified ? '<span style="color:#166534;">Oui</span>' : '<span style="color:#dc2626;">Non</span>'}</td>
            <td>${subBadge}</td>
            <td style="white-space:nowrap;">${trialEndCell}</td>
            <td>${u.rating ? "★ " + u.rating : "—"}</td>
            <td>
              <div class="actions">
                ${!u.is_verified
                  ? `<button class="btn btn-outline btn-sm" onclick="verifierUser(${u.id}, '${u.first_name}')">Verifier</button>`
                  : `<button class="btn btn-outline btn-sm" onclick="bloquerUser(${u.id}, '${u.first_name}')">Bloquer</button>`}
                ${u.subscription_status === "TRIAL" && !u.is_admin
                  ? `<button class="btn btn-warning btn-sm" onclick="stopTrial(${u.id}, '${u.first_name}')">Stopper essai</button>`
                  : ''}
                ${!u.is_admin
                  ? `<button class="btn btn-danger btn-sm" onclick="ouvrirDelete(${u.id}, '${u.first_name} ${u.last_name}')">Supprimer</button>`
                  : ''}
              </div>
            </td>
          </tr>`;
      }).join('');
    }

    document.getElementById("search-users").addEventListener("input", function() {
      const q = this.value.toLowerCase();
      renderUsers(tousLesUsers.filter(u =>
        u.email.toLowerCase().includes(q) ||
        (u.first_name + " " + u.last_name).toLowerCase().includes(q)
      ));
    });

    async function verifierUser(userId, name) {
      try {
        await apiCall("/admin-api/users/" + userId + "/verify", "PATCH");
        showAlert(name + " verifie !", "success");
        loadUsers();
      } catch(e) { showAlert(e.message); }
    }

    async function bloquerUser(userId, name) {
      if (!confirm("Bloquer " + name + " ?")) return;
      try {
        await apiCall("/admin-api/users/" + userId + "/block", "PATCH");
        showAlert(name + " bloque.", "success");
        loadUsers();
      } catch(e) { showAlert(e.message); }
    }

    async function stopTrial(userId, name) {
      if (!confirm("Stopper l'essai de " + name + " ?")) return;
      try {
        await apiCall("/admin-api/users/" + userId + "/stop-trial", "PATCH");
        showAlert("Essai de " + name + " stoppe.", "success");
        loadUsers();
      } catch(e) { showAlert(e.message); }
    }

    function ouvrirDelete(userId, userName) {
      userToDelete = userId;
      document.getElementById("delete-name").textContent = userName + " (#" + userId + ")";
      document.getElementById("delete-overlay").style.display = "flex";
    }

    function fermerDelete() {
      userToDelete = null;
      document.getElementById("delete-overlay").style.display = "none";
    }

    document.getElementById("btn-confirmer-delete").addEventListener("click", async () => {
      if (!userToDelete) return;
      try {
        await apiCall("/admin-api/users/" + userToDelete, "DELETE");
        fermerDelete();
        showAlert("Utilisateur supprime.", "success");
        loadUsers();
      } catch(e) { showAlert(e.message); fermerDelete(); }
    });

    if (Auth.isLoggedIn()) {
      apiCall("/admin-api/users").then(data => {
        document.getElementById("login-overlay").style.display = "none";
        tousLesUsers = data.users;
        updateStats(data.users);
        renderUsers(data.users);
      }).catch(() => {});
    }
  </script>
</body>
</html>

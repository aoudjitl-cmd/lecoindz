<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RayahDZ - Mon tableau de bord</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="navbar-brand">📦 RayahDZ</a>
    <div class="navbar-nav">
      <a href="dashboard.html" class="nav-link">📋 <span>Dashboard</span></a>
      <a href="trips.html" class="nav-link"><span>✈️</span> <span>Trajets</span></a>
      <a href="parcels.html" class="nav-link"><span>📦</span> <span>Colis</span></a>
      <a href="conversations.html" class="nav-link" id="nav-messages">💬 Messages</a>
      <a href="subscription.html" class="nav-link">⭐ <span>Premium</span></a>
      <div id="nav-auth"></div>
    </div>
  </nav>

  <div class="container section">

    <div id="alert-container"></div>

    <div style="margin-bottom:2rem;">
      <h1 id="welcome-title" style="font-size:1.6rem; font-weight:700;">Bonjour !</h1>
      <p style="color:var(--gray-600);">Gerez vos colis et reservations depuis votre tableau de bord.</p>
    </div>

    <div style="display:flex; gap:1rem; flex-wrap:wrap; margin-bottom:2.5rem;">
      <a href="trips.html" class="btn btn-primary">Publier un trajet</a>
      <a href="parcels.html" class="btn btn-secondary">Envoyer un colis</a>
    </div>

    <h2 class="section-title">Mes reservations</h2>
    <div style="display:flex; gap:0.5rem; flex-wrap:wrap; margin-bottom:1.5rem;">
      <button class="btn btn-primary btn-sm" id="tab-tous" onclick="filtrerReservations('tous')">Tous</button>
      <button class="btn btn-outline btn-sm" id="tab-pending" onclick="filtrerReservations('pending')">En attente</button>
      <button class="btn btn-outline btn-sm" id="tab-accepted" onclick="filtrerReservations('accepted')">Acceptes</button>
      <button class="btn btn-outline btn-sm" id="tab-transit" onclick="filtrerReservations('transit')">En transit</button>
      <button class="btn btn-outline btn-sm" id="tab-delivered" onclick="filtrerReservations('delivered')">Livres</button>
    </div>

    <div id="bookings-container">
      <p style="color:var(--gray-400);">Chargement...</p>
    </div>

  </div>

  <!-- MODAL AVIS -->
  <div id="avis-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:200; align-items:center; justify-content:center;">
    <div class="card" style="width:100%; max-width:420px; margin:1rem;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
        <h2 style="font-size:1.2rem;">⭐ Laisser un avis</h2>
        <button onclick="fermerAvis()" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">✕</button>
      </div>
      <div id="alert-avis"></div>
      <p id="avis-pour" style="color:var(--gray-600); margin-bottom:1rem; font-size:0.95rem;"></p>
      <div style="margin-bottom:1.25rem;">
        <label class="form-label">Note</label>
        <div id="stars-container" style="display:flex; gap:0.5rem; font-size:2rem; cursor:pointer;">
          <span class="star" data-value="1">☆</span>
          <span class="star" data-value="2">☆</span>
          <span class="star" data-value="3">☆</span>
          <span class="star" data-value="4">☆</span>
          <span class="star" data-value="5">☆</span>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Commentaire (optionnel)</label>
        <textarea id="avis-comment" class="form-input" rows="3" placeholder="Decrivez votre experience..."></textarea>
      </div>
      <input type="hidden" id="avis-booking-id">
      <input type="hidden" id="avis-rating" value="0">
      <button class="btn btn-primary btn-full" id="btn-soumettre-avis">Publier l'avis</button>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    let tousLesBookings = [];
    let filtreActuel = "tous";
    let currentUser = null;

    // ===== FILTRES =====
    function filtrerReservations(filtre) {
      filtreActuel = filtre;
      const tabs = ["tous", "pending", "accepted", "transit", "delivered"];
      tabs.forEach(t => {
        const tab = document.getElementById("tab-" + t);
        tab.className = t === filtre ? "btn btn-primary btn-sm" : "btn btn-outline btn-sm";
      });
      let filtered = tousLesBookings;
      if (filtre === "pending") filtered = tousLesBookings.filter(b => b.status === "PENDING");
      else if (filtre === "accepted") filtered = tousLesBookings.filter(b => b.status === "ACCEPTED");
      else if (filtre === "transit") filtered = tousLesBookings.filter(b => b.status === "IN_TRANSIT");
      else if (filtre === "delivered") filtered = tousLesBookings.filter(b => b.status === "DELIVERED");
      renderBookings(filtered);
    }

    // ===== STATUT =====
    async function changerStatut(bookingId, status) {
      try {
        await BookingsAPI.updateStatus(bookingId, status);
        showAlert("Statut mis a jour !", "success");
        await loadBookings();
      } catch (e) {
        showAlert(e.message);
      }
    }

    // ===== AVIS =====
    function ouvrirAvis(bookingId, reviewedId, reviewedName) {
      document.getElementById("avis-booking-id").value = bookingId;
      document.getElementById("avis-rating").value = 0;
      document.getElementById("avis-comment").value = "";
      document.getElementById("avis-pour").textContent = "Votre avis sur : " + reviewedName;
      document.getElementById("avis-overlay").style.display = "flex";
      resetStars();
    }

    function fermerAvis() {
      document.getElementById("avis-overlay").style.display = "none";
    }

    function resetStars() {
      document.querySelectorAll(".star").forEach(s => s.textContent = "☆");
      document.getElementById("avis-rating").value = 0;
    }

    function setStars(value) {
      document.querySelectorAll(".star").forEach(s => {
        s.textContent = parseInt(s.dataset.value) <= value ? "★" : "☆";
      });
      document.getElementById("avis-rating").value = value;
    }

    document.querySelectorAll(".star").forEach(star => {
      star.addEventListener("click", () => setStars(parseInt(star.dataset.value)));
      star.addEventListener("mouseover", () => {
        document.querySelectorAll(".star").forEach(s => {
          s.textContent = parseInt(s.dataset.value) <= parseInt(star.dataset.value) ? "★" : "☆";
        });
      });
      star.addEventListener("mouseout", () => {
        setStars(parseInt(document.getElementById("avis-rating").value));
      });
    });

    document.getElementById("btn-soumettre-avis").addEventListener("click", async () => {
      const rating = parseInt(document.getElementById("avis-rating").value);
      if (rating === 0) {
        showAlert("Veuillez selectionner une note.", "error", "alert-avis");
        return;
      }
      try {
        await apiCall("/reviews/", "POST", {
          booking_id: parseInt(document.getElementById("avis-booking-id").value),
          rating: rating,
          comment: document.getElementById("avis-comment").value || null
        });
        fermerAvis();
        showAlert("Avis publie avec succes !", "success");
        await loadBookings();
      } catch(e) {
        showAlert(e.message, "error", "alert-avis");
      }
    });

    // ===== RENDU RESERVATIONS =====
    function renderBookings(bookings) {
      const container = document.getElementById("bookings-container");
      const user = currentUser;

      if (bookings.length === 0) {
        container.innerHTML = `
          <div class="card" style="text-align:center; padding:3rem;">
            <div style="font-size:3rem; margin-bottom:1rem;">📭</div>
            <p style="color:var(--gray-400);">Aucune reservation dans cette categorie.</p>
          </div>`;
        return;
      }

      container.innerHTML = bookings.map(b => {
        const isCarrier = b.carrier_id === user.id;
        const role = isCarrier ? "Vous transportez" : "Votre colis";
        const actions = [];

        if (!isCarrier && b.status === "PENDING") {
          actions.push(`<button class="btn btn-secondary btn-sm" onclick="changerStatut(${b.id}, 'ACCEPTED')">Accepter</button>`);
          actions.push(`<button class="btn btn-danger btn-sm" onclick="changerStatut(${b.id}, 'CANCELLED')">Refuser</button>`);
        }
        if (isCarrier && b.status === "PENDING") {
          actions.push(`<span style="font-size:0.8rem; color:var(--gray-400);">En attente de l'expediteur</span>`);
        }
        if (isCarrier && b.status === "ACCEPTED") {
          actions.push(`<button class="btn btn-primary btn-sm" onclick="changerStatut(${b.id}, 'IN_TRANSIT')">Prise en charge</button>`);
        }
        if (!isCarrier && b.status === "IN_TRANSIT") {
          actions.push(`<button class="btn btn-secondary btn-sm" onclick="changerStatut(${b.id}, 'DELIVERED')">Confirmer livraison</button>`);
        }
        if (b.status === "DELIVERED") {
          const reviewedId = isCarrier ? b.sender_id : b.carrier_id;
          const reviewedName = isCarrier
            ? b.sender.first_name + " " + b.sender.last_name
            : b.carrier.first_name + " " + b.carrier.last_name;
          actions.push(`<button class="btn btn-outline btn-sm" onclick="ouvrirAvis(${b.id}, ${reviewedId}, '${reviewedName}')">⭐ Laisser un avis</button>`);
        }

        return `
          <div class="card" style="margin-bottom:1rem;">
            <div style="display:flex; justify-content:space-between; align-items:start; flex-wrap:wrap; gap:1rem;">
              <div>
                <div style="font-size:0.8rem; color:var(--gray-400); margin-bottom:4px;">${role}</div>
                <div style="font-weight:600;">Reservation #${b.id}</div>
                <div style="font-size:0.875rem; color:var(--gray-600); margin-top:4px;">
                  Expediteur : ${b.sender.first_name} ${b.sender.last_name}<br>
                  Voyageur : ${b.carrier.first_name} ${b.carrier.last_name}<br>
                  Prix convenu : <strong>${b.agreed_price}€</strong>
                </div>
              </div>
              <div style="text-align:right;">
                ${getStatusBadge(b.status)}
                ${b.status === "ACCEPTED" ? `
                  <div style="margin-top:8px; font-size:0.8rem; color:var(--gray-600);">
                    Code remise : <strong>${b.pickup_code}</strong>
                  </div>` : ""}
                ${b.status === "IN_TRANSIT" ? `
                  <div style="margin-top:8px; font-size:0.8rem; color:var(--gray-600);">
                    Code livraison : <strong>${b.delivery_code}</strong>
                  </div>` : ""}
              </div>
            </div>
            <div style="margin-top:1rem; display:flex; gap:0.5rem; flex-wrap:wrap; align-items:center;">
              <a href="chat.html?booking_id=${b.id}" class="btn btn-outline btn-sm">
                Chat <span id="unread-${b.id}" style="display:none; background:var(--danger); color:white; border-radius:50%; padding:1px 6px; font-size:0.75rem; margin-left:4px;"></span>
              </a>
              ${actions.join("")}
            </div>
          </div>`;
      }).join("");
    }

    // ===== CHARGEMENT =====
    async function loadBookings() {
      try {
        const data = await BookingsAPI.getMine();
        if (data.bookings.length === 0) {
          tousLesBookings = [];
          document.getElementById("bookings-container").innerHTML = `
            <div class="card" style="text-align:center; padding:3rem;">
              <div style="font-size:3rem; margin-bottom:1rem;">📭</div>
              <p style="color:var(--gray-400);">Aucune reservation pour le moment.</p>
              <a href="parcels.html" class="btn btn-primary" style="margin-top:1rem;">Envoyer un colis</a>
            </div>`;
          return;
        }
        tousLesBookings = await Promise.all(
          data.bookings.map(async b => {
            let paymentStatus = "NOT_PAID";
            try {
              const payment = await PaymentsAPI.getStatus(b.id);
              paymentStatus = payment.status || "NOT_PAID";
            } catch(e) {}
            return { ...b, paymentStatus };
          })
        );
        filtrerReservations(filtreActuel);
      } catch (e) {
        showAlert(e.message);
      }
    }

    async function loadUnreadCounts() {
      try {
        const data = await BookingsAPI.getMine();
        for (const b of data.bookings) {
          try {
            const msgs = await MessagesAPI.getConversation(b.id);
            const unread = msgs.messages.filter(m =>
              m.sender_id !== currentUser.id && m.is_read === 0
            ).length;
            const badge = document.getElementById("unread-" + b.id);
            if (badge && unread > 0) {
              badge.textContent = unread;
              badge.style.display = "inline";
            }
          } catch(e) {}
        }
      } catch(e) {}
    }

    (async () => {
      await requireSubscription();
      updateNavbar();
      currentUser = Auth.getUser();
      if (currentUser) {
        document.getElementById("welcome-title").textContent = "Bonjour, " + currentUser.first_name + " !";
      }
      await loadBookings();
      loadUnreadCounts();
      setInterval(loadUnreadCounts, 10000);
    })();
  </script>
  <script src="js/hamburger.js"></script>
</body>
</html>
